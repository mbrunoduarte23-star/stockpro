<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockPro Bearon</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StockPro">
    <meta name="description" content="Sistema de Gestão de Estoque e Vendas - Bearon Suplementos">
    
    <!-- PWA Links -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app"></div>
    <div id="modal-produto" class="modal-overlay"></div>
    <div id="modal-mov" class="modal-overlay"></div>
    <div id="modal-usuario" class="modal-overlay"></div>
    
        <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
      import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';
      const firebaseConfig = {
        apiKey: "AIzaSyDxtBgdg9dPArhRiT3pQZ2n0VYMwlZexQI",
        authDomain: "stockpro-ccb40.firebaseapp.com",
        projectId: "stockpro-ccb40",
        storageBucket: "stockpro-ccb40.firebasestorage.app",
        messagingSenderId: "753178487994",
        appId: "1:753178487994:web:4a75eb98a819f0f1efe683"
      };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      window._fbSalvar = async function(dados) {
        try { await setDoc(doc(db,'stockpro','dados'), dados); } catch(e) { console.error(e); }
      };
      window._fbCarregar = async function() {
        try { const snap = await getDoc(doc(db,'stockpro','dados')); return snap.exists() ? snap.data() : null; } catch(e) { return null; }
      };
    </script>
    <script src="script.js"></script>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
