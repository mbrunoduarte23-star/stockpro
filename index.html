    <!-- 🔒 FUNÇÕES SEGURANÇA v2.0 (adicione no FINAL do script.js) -->
    <script>
      // =================== STOCKPRO v2.0 SEGURANÇA ===================
      const CHAVE_CRIPTO = 'stockpro-ccb40-bearon-mg-2026';
      const JWT_SECRET = 'jwt-stockpro-firebase-talles-bruno';
      
      // 1. HASH SENHAS
      function hashSenha(senha) {
        const salt = 'ccb40-bearon2026';
        return btoa(senha + salt).slice(0,60).padEnd(60,'0');
      }
      
      // 2. JWT SESSÕES 15min
      function gerarJWT(user) {
        const payload = {
          id: user.id, nome: user.nome, perfil: user.perfil,
          iat: Math.floor(Date.now()/1000),
          exp: Math.floor(Date.now()/1000) + 900 // 15min
        };
        return jwt_js.sign(payload, JWT_SECRET);
      }
      
      function validarJWT(token) {
        try { return jwt_js.verify(token, JWT_SECRET); } catch(e) { return false; }
      }
      
      // 3. LOGS AUDITORIA (salva Firebase)
      function adicionarLog(acao, detalhes = {}) {
        if (window.usuarioLogado) {
          const log = {
            id: Date.now(),
            timestamp: new Date().toISOString(),
            usuario: window.usuarioLogado.nome,
            perfil: window.usuarioLogado.perfil,
            acao: acao,
            detalhes: detalhes
          };
          window.DB = window.DB || {{}};
          window.DB.logs = window.DB.logs || [];
          window.DB.logs.push(log);
          if (window._fbSalvar) window._fbSalvar(window.DB);
          console.log('🔒 LOG:', log);
        }
      }
      
      // 4. VERIFICAÇÃO SESSÃO (chame nas telas protegidas)
      function verificarSessao() {
        const token = sessionStorage.getItem('jwt_stockpro');
        if (!token || !validarJWT(token)) {
          sessionStorage.clear();
          adicionarLog('SESSAO_EXPIRADA');
          alert('Sessão expirou (15min). Faça login novamente.');
          // Redireciona pro login da sua app
          return false;
        }
        return true;
      }
      
      // 5. CRIPTO BACKUP (se precisar)
      function criptografarBackup(db) {
        return CryptoJS.AES.encrypt(JSON.stringify(db), CHAVE_CRIPTO).toString();
      }

          console.log('✅ Login JWT OK - 15min');
        }
      };
      
      // 7. LOGOUT

        adicionarLog('LOGOUT');
        sessionStorage.clear();
        window.usuarioLogado = null;
        // Seu logout UI
      };
      
      console.log('🔒 StockPro v2.0 SEGURA ativa! Firebase+JWT+Logs');
