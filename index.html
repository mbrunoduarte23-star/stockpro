// ===== ESTADO =====
let DB = JSON.parse(JSON.stringify(DB_INICIAL));
let usuarioLogado = null;
let estado = {
  tela: 'login',
  carrinho: [],
  busca: '',
  filtroMarca: 'Todas',
  filtroCategoria: 'Todas'
};

window.DB = DB;

// ===== PERSISTÊNCIA =====
function salvar() { salvarCompleto(); } // alias de compatibilidade

function carregar() {
  _fbCarregar().then(data => {
    if (data) {
      // Carrega vendas, caixa, logs e produtos do Firebase (dados operacionais)
      if (data.vendas)   DB.vendas   = data.vendas;
      if (data.caixa)    DB.caixa    = data.caixa;
      if (data.logs)     DB.logs     = data.logs;
      if (data.proximoId) DB.proximoId = data.proximoId;
      // Produtos: usa os do Firebase se tiver, senão mantém os do DB_INICIAL
      if (data.produtos && data.produtos.length > 0) DB.produtos = data.produtos;
      // NUNCA sobrescreve usuários — sempre usa os do DB_INICIAL com senhas corretas
      // (usuários criados pelo gestor são salvos separado abaixo)
      if (data.usuariosExtras && data.usuariosExtras.length > 0) {
        // Adiciona apenas usuários criados pelo gestor (não os padrão)
        const idsBase = [1, 2, 3, 4, 5];
        data.usuariosExtras.forEach(u => {
          if (!idsBase.includes(u.id) && !DB.usuarios.find(x => x.id === u.id)) {
            DB.usuarios.push(u);
          }
        });
      }
      console.log('✅ Firebase carregado:', DB.produtos.length, 'produtos,', DB.vendas.length, 'vendas');
    } else {
      console.log('✅ Primeira execução — dados iniciais carregados');
    }
    if (usuarioLogado) render();
  });
}

function salvarCompleto() {
  // Salva tudo EXCETO os 3 usuários base (salva só os extras criados pelo gestor)
  const extras = DB.usuarios.filter(u => u.id > 3);
  _fbSalvar({
    vendas:        DB.vendas,
    caixa:         DB.caixa,
    logs:          DB.logs,
    produtos:      DB.produtos,
    proximoId:     DB.proximoId,
    usuariosExtras: extras
  });
}

// ===== UTILITÁRIOS =====
function fmtMoeda(v) {
  return 'R$ ' + parseFloat(v || 0).toFixed(2).replace('.', ',');
}

function showToast(msg, tipo = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast ${tipo === 'error' ? 'error' : ''}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 50);
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3500);
}

function adicionarLog(acao, detalhes = {}) {
  if (!usuarioLogado) return;
  DB.logs.unshift({
    id: Date.now(),
    timestamp: new Date().toISOString(),
    usuario: usuarioLogado.nome,
    acao,
    detalhes
  });
  if (DB.logs.length > 500) DB.logs = DB.logs.slice(0, 500);
}

// ===== NORMALIZAR SENHAS (garante formato correto após carregar do Firebase) =====
function normalizarSenhas() {
  // Senhas fixas dos usuários padrão — sempre mantém sincronizado
  const senhasPadrao = {
    'maria':  'maria1234bearon',
    'joao':   'joao1234bearon',
    'ana':    'ana1234bearon',
    'bruno':  'bruno1234bearon',
    'talles': 'talles1234bearon'
  };
  DB.usuarios.forEach(u => {
    if (senhasPadrao[u.usuario]) {
      u.senha = senhasPadrao[u.usuario];
    }
  });
}

// ===== LOGIN / LOGOUT =====
function fazerLogin() {
  const user = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;

  // Suporta tanto o hash novo (usuario+senha+bearon) quanto a senha direta (compatibilidade)
  const senhaHash = user + pass + 'bearon';
  const usuario = DB.usuarios.find(u =>
    u.usuario === user &&
    (u.senha === senhaHash || u.senha === pass || u.senha === (pass + 'ccb40bearon2026').slice(0,60)) &&
    u.ativo
  );

  if (usuario) {
    usuarioLogado = usuario;
    
    estado.tela = 'dashboard';
    document.getElementById('modal-login').style.display = 'none';
    render();
    showToast(`Bem-vindo(a), ${usuario.nome}!`);
    adicionarLog('LOGIN');
    salvarCompleto();
  } else {
    showToast('Usuário ou senha inválidos', 'error');
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
  }
}

function logout() {
  adicionarLog('LOGOUT');
  salvarCompleto();
  
  usuarioLogado = null;
  estado = { tela: 'login', carrinho: [], busca: '', filtroMarca: 'Todas', filtroCategoria: 'Todas' };
  document.getElementById('modal-login').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('app').innerHTML = '';
  showToast('Até logo!');
}

function verificarSessao() {
  if (usuarioLogado) return true;
  const saved = null; // sessionStorage removido
  if (saved) {
    try {
      const u = JSON.parse(saved);
      usuarioLogado = DB.usuarios.find(x => x.id === u.id && x.ativo);
      return !!usuarioLogado;
    } catch(e) { return false; }
  }
  return false;
}

// ===== RENDER PRINCIPAL =====
function render() {
  if (!verificarSessao()) {
    document.getElementById('modal-login').style.display = 'flex';
    document.getElementById('app').innerHTML = '';
    return;
  }
  document.getElementById('modal-login').style.display = 'none';

  const app = document.getElementById('app');
  const telas = { dashboard: renderDashboard, catalogo: renderCatalogo, vendas: renderVendas, relatorios: renderRelatorios, usuarios: renderUsuarios };
  const fn = telas[estado.tela];
  if (fn) app.innerHTML = fn();
  else app.innerHTML = renderDashboard();
}

function renderListaVenda(busca = '') {
  const div = document.getElementById('lista-venda');
  if (!div) return;
  const lista = DB.produtos.filter(p =>
    (!busca || p.nome.toLowerCase().includes(busca.toLowerCase()) || p.codigo.toLowerCase().includes(busca.toLowerCase())) &&
    p.estoqueAtual > 0
  ).slice(0, 30);

  div.innerHTML = lista.length === 0 ? '<p style="text-align:center;color:var(--text2);padding:20px">Nenhum produto com estoque disponível</p>' :
    lista.map(p => `
      <div class="produto-item" style="cursor:pointer" onclick="adicionarCarrinho('${p.codigo}')">
        <div class="produto-info">
          <div class="produto-nome">${p.nome} <span class="badge badge-marca">${p.marca}</span></div>
          <div class="produto-dados">${fmtMoeda(p.precoVenda)} | Estoque: ${p.estoqueAtual} ${p.unidade}</div>
        </div>
        <button class="btn-success">+ Adicionar</button>
      </div>`).join('');
}

function calcDesconto() {
  const input = document.getElementById('desconto-venda');
  const div = document.getElementById('valor-desconto');
  if (!input || !div) return;
  const desc = parseFloat(input.value) || 0;
  const total = estado.carrinho.reduce((s, i) => s + i.qtd * i.precoVenda, 0);
  const limite = usuarioLogado?.limiteDesconto || 0;
  if (desc > limite) { input.value = limite; }
  const valDesc = total * (Math.min(desc, limite) / 100);
  const valFinal = total - valDesc;
  div.innerHTML = valDesc > 0 ? `Desconto: -${fmtMoeda(valDesc)} → Total: <strong style="color:var(--success)">${fmtMoeda(valFinal)}</strong>` : '';
}

function ajustarQtd(index, delta) {
  const item = estado.carrinho[index];
  if (!item) return;
  const prod = DB.produtos.find(p => p.codigo === item.codigo);
  const novaQtd = item.qtd + delta;
  if (novaQtd <= 0) { estado.carrinho.splice(index, 1); }
  else if (prod && novaQtd > prod.estoqueAtual) { showToast('Quantidade excede o estoque!', 'error'); return; }
  else { item.qtd = novaQtd; }
  render();
  setTimeout(() => renderListaVenda(document.getElementById('busca-venda')?.value || ''), 50);
}

function removerDoCarrinho(index) {
  estado.carrinho.splice(index, 1);
  render();
  setTimeout(() => renderListaVenda(document.getElementById('busca-venda')?.value || ''), 50);
}

function adicionarCarrinho(codigo) {
  const prod = DB.produtos.find(p => p.codigo === codigo);
  if (!prod) return showToast('Produto não encontrado', 'error');
  if (prod.estoqueAtual <= 0) return showToast('Sem estoque disponível!', 'error');

  const item = estado.carrinho.find(i => i.codigo === codigo);
  if (item) {
    const prod2 = DB.produtos.find(p => p.codigo === codigo);
    if (item.qtd >= prod2.estoqueAtual) return showToast('Quantidade máxima atingida!', 'error');
    item.qtd++;
  } else {
    estado.carrinho.push({ ...prod, qtd: 1 });
  }

  if (estado.tela !== 'vendas') {
    showToast(`${prod.nome} adicionado ao carrinho!`);
    adicionarLog('CARRINHO_ADD', { codigo, nome: prod.nome });
  } else {
    render();
    setTimeout(() => renderListaVenda(document.getElementById('busca-venda')?.value || ''), 50);
  }
}

function finalizarVenda() {
  if (!estado.carrinho.length) return showToast('Carrinho vazio!', 'error');

  const total = estado.carrinho.reduce((s, i) => s + i.qtd * i.precoVenda, 0);
  const descontoInput = document.getElementById('desconto-venda');
  const desconto = Math.min(parseFloat(descontoInput?.value || 0), usuarioLogado?.limiteDesconto || 0);
  const formaPgto = document.getElementById('forma-pgto')?.value || 'Dinheiro';
  const totalFinal = total * (1 - desconto / 100);

  // Verifica estoque
  for (const item of estado.carrinho) {
    const prod = DB.produtos.find(p => p.codigo === item.codigo);
    if (!prod || prod.estoqueAtual < item.qtd) {
      return showToast(`Estoque insuficiente: ${item.nome}`, 'error');
    }
  }

  const venda = {
    id: DB.proximoId.venda++,
    data: new Date().toISOString(),
    usuario: usuarioLogado.nome,
    usuarioId: usuarioLogado.id,
    itens: estado.carrinho.map(i => ({ codigo: i.codigo, nome: i.nome, qtd: i.qtd, precoUnit: i.precoVenda, total: i.qtd * i.precoVenda })),
    totalOriginal: total,
    desconto,
    totalFinal,
    formaPagamento: formaPgto
  };

  // Baixar estoque
  estado.carrinho.forEach(item => {
    const prod = DB.produtos.find(p => p.codigo === item.codigo);
    if (prod) prod.estoqueAtual -= item.qtd;
  });

  DB.vendas.push(venda);
  DB.caixa.entradas += totalFinal;

  adicionarLog('VENDA', { id: venda.id, total: totalFinal, desconto, itens: venda.itens.length, forma: formaPgto });
  salvarCompleto();

  estado.carrinho = [];
  estado.tela = 'dashboard';
  render();
  showToast(`Venda #${venda.id} — ${fmtMoeda(totalFinal)} via ${formaPgto}`);
}

// ===== MOVIMENTAÇÃO ESTOQUE =====
function abrirMovEstoque(codigo) {

  if (!prod) return;

  document.getElementById('modal-estoque-content').innerHTML = `
    <h3>📦 Movimentação de Estoque</h3>
    <p style="color:var(--text2);margin-bottom:20px">${prod.nome} — <strong>${prod.marca}</strong></p>

      <div><div style="font-size:12px;color:var(--text2)">ATUAL</div><div style="font-size:24px;font-weight:800;color:var(--gold)">${prod.estoqueAtual}</div></div>
      <div><div style="font-size:12px;color:var(--text2)">MÍNIMO</div><div style="font-size:24px;font-weight:800;color:var(--warning)">${prod.estoqueMin}</div></div>
      <div><div style="font-size:12px;color:var(--text2)">UNIDADE</div><div style="font-size:24px;font-weight:800;color:var(--text)">${prod.unidade}</div></div>
    </div>
    <div class="input-group">
      <label>Tipo de Movimentação</label>
      <select id="mov-tipo">
        <option value="entrada">➕ Entrada (compra/recebimento)</option>
        <option value="saida">➖ Saída (avaria/uso/descarte)</option>
      </select>
    </div>
    <div class="input-group">
      <label>Quantidade</label>
      <input id="mov-qtd" type="number" min="1" value="1">
    </div>
    <div class="input-group">
      <label>Motivo / Observação</label>
      <input id="mov-motivo" placeholder="Ex: Compra do fornecedor, produto vencido...">
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn-primary" style="flex:1" onclick="confirmarMovEstoque('${codigo}')">✅ Confirmar</button>
      <button class="btn-secondary" style="flex:1" onclick="fecharModal('modal-estoque')">Cancelar</button>
    </div>`;

  document.getElementById('modal-estoque').style.display = 'flex';
}

function confirmarMovEstoque(codigo) {
  const tipo = document.getElementById('mov-tipo').value;
  const qtd = parseInt(document.getElementById('mov-qtd').value);
  const motivo = document.getElementById('mov-motivo').value || 'Sem motivo informado';

  if (!qtd || qtd <= 0) return showToast('Informe uma quantidade válida', 'error');

  const prod = DB.produtos.find(p => p.codigo === codigo);
  if (!prod) return;

  if (tipo === 'saida' && prod.estoqueAtual < qtd) {
    return showToast(`Estoque insuficiente! Disponível: ${prod.estoqueAtual}`, 'error');
  }

  prod.estoqueAtual += tipo === 'entrada' ? qtd : -qtd;

  adicionarLog('MOV_ESTOQUE', { codigo, nome: prod.nome, tipo, qtd, motivo, novoEstoque: prod.estoqueAtual });
  salvarCompleto();
  fecharModal('modal-estoque');
  render();
  showToast(`${tipo === 'entrada' ? '➕ Entrada' : '➖ Saída'}: ${qtd} ${prod.unidade} | Novo estoque: ${prod.estoqueAtual}`);
}

function salvarProduto(codigoExistente) {
  const nome = document.getElementById('prd-nome').value.trim();
  if (!nome) return showToast('Nome do produto é obrigatório', 'error');

  const dados = {
    nome,
    marca: document.getElementById('prd-marca').value,
    categoria: document.getElementById('prd-cat').value,
    precoCusto: parseFloat(document.getElementById('prd-custo').value) || 0,
    precoVenda: parseFloat(document.getElementById('prd-venda').value) || 0,
    unidade: document.getElementById('prd-un').value,
    estoqueAtual: parseInt(document.getElementById('prd-estq').value) || 0,
    estoqueMin: parseInt(document.getElementById('prd-min').value) || 5,
    descricao: document.getElementById('prd-desc').value,
    beneficios: document.getElementById('prd-benef').value,
    observacoes: document.getElementById('prd-obs').value
  };

  if (codigoExistente) {
    const idx = DB.produtos.findIndex(p => p.codigo === codigoExistente);
    if (idx >= 0) { DB.produtos[idx] = { ...DB.produtos[idx], ...dados }; }
    showToast('Produto atualizado com sucesso!');
    adicionarLog('PRODUTO_EDIT', { codigo: codigoExistente, nome });
  } else {
    const novoCodigo = 'P' + String(DB.proximoId.produto++).padStart(3, '0');
    DB.produtos.push({ codigo: novoCodigo, ...dados });
    showToast(`Produto cadastrado! Código: ${novoCodigo}`);
    adicionarLog('PRODUTO_NOVO', { codigo: novoCodigo, nome });
  }

  salvarCompleto();
  fecharModal('modal-produto');
  render();
}

function renderRelatorios() {

  const vendasPorForma = {};
  const vendasPorUsuario = {};
  let totalVendido = 0, totalDesconto = 0;

  DB.vendas.forEach(v => {
    totalVendido += v.totalFinal;
    totalDesconto += v.totalOriginal - v.totalFinal;
    vendasPorForma[v.formaPagamento] = (vendasPorForma[v.formaPagamento] || 0) + v.totalFinal;
    vendasPorUsuario[v.usuario] = (vendasPorUsuario[v.usuario] || { qtd: 0, total: 0 });
    vendasPorUsuario[v.usuario].qtd++;
    vendasPorUsuario[v.usuario].total += v.totalFinal;
  });

  // Produtos com baixo giro
  const prodVendidos = {};
  DB.vendas.forEach(v => v.itens.forEach(i => {
    prodVendidos[i.codigo] = (prodVendidos[i.codigo] || 0) + i.qtd;

  const baixoGiro = DB.produtos

    .slice(0, 10);

  const rentabilidade = DB.produtos
    .filter(p => p.precoCusto > 0)
    .map(p => ({ ...p, margem: ((p.precoVenda - p.precoCusto) / p.precoCusto * 100).toFixed(1) }))

        <div class="relatorio-card"><div style="font-size:13px;color:var(--text2)">TOTAL VENDAS</div><div style="font-size:28px;font-weight:800;color:var(--gold)">${DB.vendas.length}</div></div>
        <div class="relatorio-card"><div style="font-size:13px;color:var(--text2)">TOTAL DESCONTOS</div><div style="font-size:28px;font-weight:800;color:var(--warning)">${fmtMoeda(totalDesconto)}</div></div>
      </div>
      <div class="card">
        <h3>💳 Formas de Pagamento</h3>
        ${Object.entries(vendasPorForma).length === 0 ? '<p style="color:var(--text2)">Nenhuma venda registrada.</p>' :
          Object.entries(vendasPorForma).sort((a,b)=>b[1]-a[1]).map(([forma, val]) => `
            <div class="relatorio-card" style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-weight:600">${forma}</span>
              <span style="font-weight:800;color:var(--gold)">${fmtMoeda(val)}</span>
            </div>`).join('')}
      </div>
      <div class="card">
        <h3>👥 Desempenho por Funcionário</h3>
        ${Object.entries(vendasPorUsuario).length === 0 ? '<p style="color:var(--text2)">Nenhuma venda registrada.</p>' :
          Object.entries(vendasPorUsuario).sort((a,b)=>b[1].total-a[1].total).map(([user, dados]) => `
            <div class="relatorio-card" style="display:flex;justify-content:space-between;align-items:center">
              <div><div style="font-weight:600">${user}</div><div style="font-size:12px;color:var(--text2)">${dados.qtd} venda(s)</div></div>
              <span style="font-weight:800;color:var(--success)">${fmtMoeda(dados.total)}</span>
            </div>`).join('')}
      </div>
      <div class="card">
        <h3>⚠️ Baixo Giro (Candidatos ao Descarte)</h3>
        ${baixoGiro.length === 0 ? '<p style="color:var(--text2)">Todos os produtos têm giro adequado.</p>' :
          baixoGiro.map(p => `
            <div class="alerta-box">
              <div>
                <div style="font-weight:600;font-size:14px">${p.nome}</div>
                <div style="font-size:12px;color:var(--text2)">${p.marca} | Estoque: ${p.estoqueAtual}</div>
              </div>
              <span class="badge badge-low">${prodVendidos[p.codigo]||0} vendas</span>
            </div>`).join('')}
      </div>
    </div>
    <div class="card" style="margin-top:20px">
      <h3>📈 Rentabilidade por Produto</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Produto</th><th>Marca</th><th>Custo</th><th>Venda</th><th>Margem</th><th>Estoque</th></tr></thead>

                <td>${fmtMoeda(p.precoCusto)}</td>
                <td>${fmtMoeda(p.precoVenda)}</td>
                <td><span class="badge ${parseFloat(p.margem)>40?'badge-ok':parseFloat(p.margem)>20?'':' badge-low'}" style="${parseFloat(p.margem)>20&&parseFloat(p.margem)<=40?'background:#fef3c7;color:#92400e':''}">${p.margem}%</span></td>
                <td>${p.estoqueAtual} ${p.unidade}</td>
              </tr>`).join('')}

        </table>

                <td>${v.formaPagamento}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

  document.getElementById('modal-produto-content').innerHTML = `
    <h3>${u ? '✏️ Editar Usuário' : '➕ Novo Usuário'}</h3>
    <div class="input-group"><label>Nome Completo</label><input id="usr-nome" value="${u?.nome||''}" placeholder="Ex: Carlos Vendedor"></div>

    <div class="input-group"><label>Perfil</label>
      <select id="usr-perfil">
        <option value="funcionario" ${u?.perfil==='funcionario'?'selected':''}>👷 Funcionário</option>

      </select>
    </div>
    <div class="input-group"><label>Limite de Desconto %</label><input id="usr-desc" type="number" min="0" max="100" value="${u?.limiteDesconto||10}"></div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn-primary" style="flex:1" onclick="salvarUsuario(${id||'null'})">💾 Salvar</button>

    </div>`;
  document.getElementById('modal-produto').style.display = 'flex';

function salvarUsuario(id) {
  const nome = document.getElementById('usr-nome').value.trim();
  const login = document.getElementById('usr-login').value.trim().toLowerCase();
  const senha = document.getElementById('usr-senha').value;
  const perfil = document.getElementById('usr-perfil').value;
  const limiteDesconto = parseInt(document.getElementById('usr-desc').value) || 0;

  if (!nome || !login) return showToast('Nome e login são obrigatórios', 'error');

  if (id && id !== 'null') {
    const u = DB.usuarios.find(x => x.id === id);
    if (!u) return;
    u.nome = nome;
    u.perfil = perfil;
    u.limiteDesconto = limiteDesconto;
    if (senha) u.senha = login + senha + 'bearon';
    showToast('Usuário atualizado!');
  } else {
    if (DB.usuarios.find(u => u.usuario === login)) return showToast('Login já existe!', 'error');
    if (!senha) return showToast('Senha obrigatória para novo usuário', 'error');
    const novoId = Math.max(...DB.usuarios.map(u => u.id)) + 1;
    DB.usuarios.push({ id: novoId, nome, usuario: login, senha: login + senha + 'bearon', perfil, ativo: true, limiteDesconto });
    showToast(`Usuário ${nome} criado!`);
  }

  salvarCompleto();
  fecharModal('modal-produto');
  render();
}

function toggleUsuario(id) {
  const u = DB.usuarios.find(x => x.id === id);
  if (!u) return;
  u.ativo = !u.ativo;
  adicionarLog('USUARIO_TOGGLE', { id, nome: u.nome, ativo: u.ativo });
  salvarCompleto();
  render();
  showToast(`${u.nome}: ${u.ativo ? 'ativado' : 'desativado'}`);
}

function exportExcel() {
  const wb = XLSX.utils.book_new();

  // Aba Produtos
  const prodData = DB.produtos.map(p => ({
    Codigo: p.codigo, Produto: p.nome, Marca: p.marca, Categoria: p.categoria,
    'Estoque Atual': p.estoqueAtual, 'Estoque Mínimo': p.estoqueMin, Unidade: p.unidade,
    'Preço Custo': p.precoCusto, 'Preço Venda': p.precoVenda,
    'Margem %': p.precoCusto > 0 ? ((p.precoVenda-p.precoCusto)/p.precoCusto*100).toFixed(1) : 0,
    Descrição: p.descricao || '', Benefícios: p.beneficios || ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prodData), 'Estoque');

  // Aba Vendas
  if (DB.vendas.length > 0) {
    const vendasData = DB.vendas.map(v => ({
      ID: v.id, Data: new Date(v.data).toLocaleString('pt-BR'),
      Funcionário: v.usuario, Itens: v.itens.length,
      'Total Original': v.totalOriginal, 'Desconto %': v.desconto,
      'Total Final': v.totalFinal, Pagamento: v.formaPagamento
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(vendasData), 'Vendas');
  }

  XLSX.writeFile(wb, `StockPro-Bearon-${new Date().toISOString().split('T')[0]}.xlsx`);
  showToast('Excel exportado com sucesso!');
  adicionarLog('EXPORT_EXCEL');
}

<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;

  window.addEventListener('message',function(e){

      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;

        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
