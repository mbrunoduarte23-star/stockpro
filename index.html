<script>
// ===== FIREBASE CONFIG =====
try {
  firebase.initializeApp({
    apiKey: "AIzaSyDxtBgdg9dPArhRiT3pQZ2n0VYMwlZexQI",
    authDomain: "stockpro-ccb40.firebaseapp.com",
    projectId: "stockpro-ccb40",
    storageBucket: "stockpro-ccb40.firebasestorage.app",
    messagingSenderId: "753178487994",
    appId: "1:753178487994:web:4a75eb98a819f0f1efe683"
  });
  window._fbDB = firebase.firestore();
  window._fbSalvar = d => window._fbDB.collection('stockpro').doc('dados').set(d).then(()=>console.log('🔥 Firebase salvo!'));
  window._fbCarregar = () => window._fbDB.collection('stockpro').doc('dados').get().then(s => s.exists ? s.data() : null);
} catch(e) { window._fbSalvar = window._fbCarregar = () => {}; }

// ===== SEGURANÇA + EXPORT (ADICIONADO) =====
let usuarioLogado = null;
const CHAVE_CRIPTO = 'stockpro-ccb40-bearon-mg-2026';
const JWT_SECRET = 'jwt-stockpro-firebase-talles-bruno';

function hashSenha(senha) {
  return btoa(senha + 'ccb40bearon2026').slice(0,60);
}

function gerarJWT(user) {
  const payload = {id:user.id,nome:user.nome,perfil:user.perfil,iat:Math.floor(Date.now()/1000),exp:Math.floor(Date.now()/1000)+900};
  return jwt_js.sign(payload, JWT_SECRET);
}

function validarJWT(token) {
  try { return jwt_js.verify(token, JWT_SECRET); } catch(e) { return false; }
}

function verificarSessao() {
  const token = sessionStorage.getItem('jwt_stockpro');
  if (!token || !validarJWT(token)) {
    sessionStorage.clear(); usuarioLogado = null; return false;
  }
  return true;
}

function adicionarLog(acao, detalhes={}) {
  if (!usuarioLogado) return;
  const log = {id:Date.now(),timestamp:new Date().toISOString(),usuario:usuarioLogado.nome,acao,detalhes};
  window.DB.logs = window.DB.logs || [];
  window.DB.logs.push(log);
  salvar();
  console.log('🔒 LOG:', log);
}

function exportPDF() {
  if (!verificarSessao()) { alert('Sessão expirada'); return; }
  adicionarLog('EXPORT_PDF');
  const content = document.getElementById('app').cloneNode(true);
  const opt = {
    margin: 1, filename: 'StockPro-Relatorio-'+new Date().toISOString().split('T')[0]+'.pdf',
    image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
  };
  html2pdf().set(opt).from(content).save();
  showToast('📄 PDF exportado!');
}

function exportExcel() {
  if (!verificarSessao()) { alert('Sessão expirada'); return; }
  adicionarLog('EXPORT_EXCEL');
  const produtos = window.DB.produtos.map(p => ({Codigo: p.codigo, Nome: p.nome, Marca: p.marca, Estoque: p.estoqueAtual, Preco: p.precoVenda}));
  const ws = XLSX.utils.json_to_sheet(produtos);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Estoque");
  XLSX.writeFile(wb, 'StockPro-Estoque.xlsx');
  showToast('📊 Excel exportado!');
}
