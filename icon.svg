<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Box icon -->
  <g transform="translate(128, 100) scale(1.0)">
    <!-- Box body -->
    <rect x="28" y="120" width="200" height="160" rx="12" fill="#f8fafc" opacity="0.95"/>
    <!-- Box flap left -->
    <path d="M28 120 L128 60 L128 120 Z" fill="#38bdf8"/>
    <!-- Box flap right -->
    <path d="M228 120 L128 60 L128 120 Z" fill="#0ea5e9"/>
    <!-- Box line -->
    <line x1="128" y1="120" x2="128" y2="280" stroke="#cbd5e1" stroke-width="3"/>
    <!-- Box tape -->
    <rect x="108" y="60" width="40" height="70" rx="4" fill="#fbbf24" opacity="0.8"/>
  </g>
  <!-- Text SP -->
  <text x="256" y="430" font-family="Arial,Helvetica,sans-serif" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="8">STOCK</text>
  <text x="256" y="480" font-family="Arial,Helvetica,sans-serif" font-size="36" font-weight="600" fill="#38bdf8" text-anchor="middle" letter-spacing="12">PRO</text>
</svg>
